<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마을 리빙랩 사례카드</title>
<style>
  :root{
    --bg: #f5f3ee;
    --card-bg: #ffffff;
    --ink: #22252a;
    --ink-soft: #5b6068;
    --line: #e7e3da;
    --accent: #2f6f5e;
    --shadow: 0 8px 24px rgba(30,30,20,0.08);
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  /* ---------- Header ---------- */
  header{
    padding: 48px 24px 28px;
    text-align:center;
    max-width: 900px;
    margin: 0 auto;
  }
  header h1{
    font-size: clamp(24px, 4vw, 34px);
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }
  header p{
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.6;
    margin: 0;
  }

  /* ---------- Controls ---------- */
  .controls{
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 8px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
    padding-top: 12px;
  }
  .search-row{
    display:flex;
    gap:10px;
    margin-bottom: 14px;
  }
  #search{
    flex:1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--line);
    font-size: 15px;
    background: var(--card-bg);
    color: var(--ink);
  }
  #search:focus{ outline: 2px solid var(--accent); outline-offset: 1px; }
  .chips{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .chip{
    border: 1px solid var(--line);
    background: var(--card-bg);
    color: var(--ink-soft);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s ease;
  }
  .chip:hover{ border-color: var(--accent); color: var(--accent); }
  .chip.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .count{
    max-width:1100px;
    margin: 0 auto;
    padding: 14px 24px 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* ---------- Grid ---------- */
  .grid{
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .card{
    perspective: 1200px;
    height: 460px;
  }
  .card-inner{
    position: relative;
    width: 100%;
    height: 100%;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform .65s cubic-bezier(.4,.2,.2,1);
  }
  .card.flipped .card-inner{
    transform: rotateY(180deg);
  }
  .card-face{
    position: absolute;
    inset: 0;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .18s ease;
  }
  .card-inner:hover .card-face{
    box-shadow: 0 14px 30px rgba(30,30,20,0.14);
  }
  .card-back{
    transform: rotateY(180deg);
  }
  .card-photo{
    position: relative;
    height: 150px;
    background-size: cover;
    background-position: center;
    background-color: #ddd8cb;
  }
  .card-photo::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.55) 100%);
  }
  .badge{
    position:absolute;
    top: 10px; left: 10px;
    z-index: 2;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    padding: 5px 10px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .region-tag{
    position:absolute;
    bottom: 8px; left: 12px;
    z-index: 2;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .card-body{
    padding: 16px 16px 18px;
    display:flex;
    flex-direction:column;
    gap: 8px;
    flex: 1;
  }
  .card-q{
    font-size: 14.5px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--ink);
  }
  .card-sol{
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .card-sol b{ color: var(--accent); }
  .card-footer{
    margin-top: auto;
    padding-top: 10px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    display:flex;
    align-items:center;
    gap:4px;
  }

  /* ---------- Card back ---------- */
  .cb-content{
    padding: 16px 16px 14px;
    overflow-y: auto;
    height: 100%;
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .cb-top{
    display:flex;
    align-items:center;
    gap: 8px;
    margin-bottom: 2px;
  }
  .badge-static{
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .cb-region{
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .section-label{
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .section-text{
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .cb-q{
    font-size: 14.5px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--ink);
  }
  .cb-sol-photo{
    width: 100%;
    height: 110px;
    object-fit: cover;
    border-radius: 10px;
    background-color: #ddd8cb;
    margin: 2px 0;
    display:block;
  }
  .sol-title{
    font-size: 14.5px;
    font-weight: 800;
  }
  .link-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top: 4px;
    padding: 9px 14px;
    background: var(--accent);
    color:#fff;
    text-decoration:none;
    border-radius: 10px;
    font-size: 12.5px;
    font-weight: 700;
    align-self: flex-start;
  }
  .link-btn:hover{ opacity: 0.9; }
  .cb-hint{
    margin-top: auto;
    padding-top: 8px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.8;
  }

  .empty{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-soft);
    grid-column: 1 / -1;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --bg: #17181b;
      --card-bg: #212226;
      --ink: #f1efe9;
      --ink-soft: #b1aea6;
      --line: #34363b;
      --accent: #6fd0b3;
      --shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
  }
  :root[data-theme="dark"]{
    --bg: #17181b;
    --card-bg: #212226;
    --ink: #f1efe9;
    --ink-soft: #b1aea6;
    --line: #34363b;
    --accent: #6fd0b3;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  :root[data-theme="light"]{
    --bg: #f5f3ee;
    --card-bg: #ffffff;
    --ink: #22252a;
    --ink-soft: #5b6068;
    --line: #e7e3da;
    --accent: #2f6f5e;
    --shadow: 0 8px 24px rgba(30,30,20,0.08);
  }
</style>
</head>
<body>

<header>
  <h1>🏘️ 마을 리빙랩 사례카드</h1>
  <p>우리 동네의 질문이, 다른 동네의 해답이 됩니다.<br>카드를 클릭해서 뒤집으면 상황과 해결 과정을 볼 수 있어요.</p>
</header>

<div class="controls">
  <div class="search-row">
    <input id="search" type="text" placeholder="지역, 질문, 해결 키워드로 검색해보세요 (예: 쓰레기, 안전, 청소년...)">
  </div>
  <div class="chips" id="chips"></div>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<script>
const DATA = [
{id:1, cat:"마을교육", region:"송화마을", q:"청소년이 마을에서 해보고 싶은 일 직접 결정할 순 없나요?", situation:"마을에 아동·청소년들이 하고 싶은 일을 기획하고 참여할 수 있는 방법이 없을까?", solTitle:"청소년자치협의회 설립 및 온ON 마을축제", solText:"마을의 문제점과 보완점을 논의하기 위한 청소년자치협의회를 설립하여 월 1회 회의를 통해 논의한다. 또, 아동·청소년의 의견을 수렴하여 유튜브로 '송화 온(on) 마을축제'를 운영하였다.", link:"https://blog.naver.com/yr2242"},
{id:2, cat:"마을교육", region:"풍영정천", q:"마을의 생태환경 활동을 아이들에게 쉽게 알려줄 수 있는 방법이 있을까?", situation:"풍영정천을 가꾸기 위한 모임을 만들고 노력하고 있다. 아이들 눈높이에 맞는 생태 교육 방법은 무엇일까?", solTitle:"'내친구 풍영정천' 워크북과 영상 교육", solText:"광산구교육포럼 운영 실행과제로 '마을생태교과서'를 제안한 후, 아이들 수업에 활용할 수 있는 '내친구 풍영정천' 워크북과 영상으로 교육한다.", link:"https://blog.naver.com/yr2242"},
{id:3, cat:"복지", region:"학운동", q:"버스정류장까지 가려면 10분 이상 걸어야 해서 노인들이 다리가 아픈데 좋은 방법이 없을까?", situation:"학운동은 마을들이 거리가 멀어서 버스정류장까지 가려면 10분 이상, 지하철은 30분 이상 걸어야 한다.", solTitle:"학운동 주민 의제 공론화를 통한 쉼의자 설치", solText:"학운동의 마을 의제로 공론화되어 현장조사를 통해 설치가 필요한 곳을 선정했다. 이후 도로교통과에 설치 가능 여부를 검토 후 쉼의자를 제작 후 설치했다.", link:"https://www.ktv.go.kr/content/view/content_jelic5-2301"},
{id:4, cat:"복지", region:"충장동", q:"복지 사각지대에 놓여 무연고 고독사로 죽음을 맞이하는 경우를 해결하기 위해 어떻게 해야 할까?", situation:"충장동에는 1인 가구 비율이 높고, 복지 사각지대에 놓여 무연고 고독사로 죽음을 맞이하는 경우가 많다.", solTitle:"마을상주단 결성 및 장례서비스 추진", solText:"마을상주단을 결성하여 무연고자 사망 후 무연고 고독사 하는 주민의 장례를 치뤘다. 마을상주단이 유골함 구입부터 장례서비스까지 마을복지공동체 사업을 추진한다.", link:"https://www.jmilbo.com/view/media/view/cade201101214157159"},
{id:5, cat:"복지", region:"상무2동", q:"겨울이 되면 더 소외되는 주민들을 위해 어떻게 하면 좋을까?", situation:"상무2동은 1인가구, 노인, 장애인 가구가 많은 마을이다.", solTitle:"주민 참여 산타 방문 기부 및 성탄절 트리 환경 개선", solText:"마을의 어려운 이웃을 파악하고 주민들이 직접 산타복을 입고 방문하여 기부받은 물품들을 나눠준다. 또, 재활용품을 활용하여 성탄절 트리로 환경을 개선한다.", link:""},
{id:6, cat:"안전", region:"화정3동", q:"교통사고 및 범죄에 노출되는 청소년, 주민 등을 위해 어떻게 해결하면 좋을까?", situation:"학교 인근 좁은 골목길, 어두운 언덕길로 인해 교통사고 및 범죄 위험이 존재한다.", solTitle:"누구나 안전한 골목길 조성 및 헬로카펫 설치", solText:"학교 학생들이 주민총회 의제로 '누구나 안전한 골목길'을 선정하여 안전지도 제작 및 부착했다. 또, 친환경 쏠라를 사용하여 어린이 승·하차구역에 헬로카펫 등을 설치했다.", link:""},
{id:7, cat:"안전", region:"화정4동", q:"상가건물에 인접한 주택가 앞의 주·정차문제, 어떻게 해결할 수 있을까?", situation:"주택가 앞 주·정차문제가 심각하여 집 앞에 주차금지 표지판, 타이어, 꼬깔콘 등 주차 방지물을 내놓는 갈등이 발생한다.", solTitle:"시간대별 '배려주차' 캠페인 전개", solText:"시간대를 나눠서 출근시간대에는 내집앞 주차를 허용하는 '배려주차' 캠페인을 통해 배려문화를 형성한다.", link:""},
{id:8, cat:"안전", region:"풍암동", q:"길거리의 흡연자들이 많아 주민들이 불편함을 느끼고 있는데, 이런 문제는 어떻게 해결할까?", situation:"무분별한 길거리 흡연으로 인해 주민들의 간접흡연 피해와 불편함이 지속되고 있다.", solTitle:"주민자치회-행정 협업 금연거리 캠페인", solText:"흡연문화를 바꿔보기 위해 주민자치회와 행정이 협업하여 금연거리 캠페인을 실시하였다. (금연거리 선포 및 표지판 설치 및 홍보)", link:""},
{id:9, cat:"안전", region:"일곡동", q:"아동·청소년들이 귀가 시 대형 화물차 불법주정차로 인해 위험한데 어떻게 해결하면 좋을까?", situation:"일곡동은 아동·청소년들의 이동이 많다. 대형 화물차를 운행하는 주민들 또한 많아 불법주정차로 인한 안전문제가 발생한다.", solTitle:"2년간의 야간 현장 모니터링 및 속도 30 캠페인", solText:"격주 토요일 저녁에 현장 모니터링을 2년간 실시했다. 그리고 마을내 속도 30 캠페인 등 안전한 마을을 만드는 지속적인 활동을 하고 있다.", link:""},
{id:10, cat:"환경", region:"일곡지구", q:"사라질 뻔했던 마지막 논의 생태적 가치를 주민의 삶 속에서 지킬 수 있는 방법은 무엇일까?", situation:"주민들이 벼농사를 지으며 마을공동체를 형성했던 일곡지구의 마지막 논이 사라질 위기에 처했었다.", solTitle:"일회용품 없는 장터 '한새봉 개굴장' 운영", solText:"한새봉 개굴장은 지구와 함께하는 삶의 변화를 위해 실험들을 지속한다. 계절별로 '돌이켜 봄', '엄마의 가을걷이', '비건파티' 등을 주제로 일회용품 없는 장터를 만들어 가고 있다.", link:""},

const CATEGORY_COLORS = {
  "마을교육": "#4F86C6",
  "복지": "#8E6FCE",
  "안전": "#E0575B",
  "환경": "#4CAF7D",
  "마을일거리": "#E0A83E",
  "안전/경제": "#D97B3D",
  "커뮤니티 공간": "#3AB0A6"
};

function stockPhoto(item){
  return `https://picsum.photos/seed/village${item.id}/700/500`;
}
function situationPhoto(item){
  return `images/${item.id}_situation.jpg`;
}
function solutionPhoto(item){
  return `images/${item.id}_solution.jpg`;
}

const grid = document.getElementById('grid');
const chipsEl = document.getElementById('chips');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');

const categories = ["전체", ...Object.keys(CATEGORY_COLORS)];
let activeCategory = "전체";
let query = "";

function renderChips(){
  chipsEl.innerHTML = categories.map(c => {
    const active = c === activeCategory ? 'active' : '';
    return `<button class="chip ${active}" data-cat="${c}">${c}</button>`;
  }).join('');
  chipsEl.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderChips();
      renderGrid();
    });
  });
}

function matchesQuery(item, q){
  if(!q) return true;
  const hay = (item.region + item.q + item.solTitle + item.cat).toLowerCase();
  return hay.includes(q.toLowerCase());
}

function renderGrid(){
  const filtered = DATA.filter(item =>
    (activeCategory === "전체" || item.cat === activeCategory) &&
    matchesQuery(item, query)
  );
  countEl.textContent = `${filtered.length}개의 사례`;

  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty">일치하는 사례가 없어요. 다른 키워드로 검색해보세요.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const color = CATEGORY_COLORS[item.cat] || "#888";
    return `
    <div class="card" data-id="${item.id}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-photo" style="background-image:url('${situationPhoto(item)}')" data-fallback="${stockPhoto(item)}">
            <span class="badge" style="background:${color}">${item.cat}</span>
            <span class="region-tag">${item.region}</span>
          </div>
          <div class="card-body">
            <div class="card-q">${item.q}</div>
            <div class="card-sol"><b>💡 ${item.solTitle}</b></div>
            <div class="card-footer">카드를 클릭해 뒤집어 보세요 ↺</div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="cb-content">
            <div class="cb-top">
              <span class="badge-static" style="background:${color}">${item.cat}</span>
              <span class="cb-region">${item.region}</span>
            </div>
            <div class="section-label">상황</div>
            <div class="cb-q">${item.q}</div>
            <div class="section-text">${item.situation}</div>
            <div class="section-label" style="margin-top:4px;">해결</div>
            <img class="cb-sol-photo" src="${solutionPhoto(item)}" onerror="this.onerror=null;this.src='${stockPhoto(item)}'" alt="">
            <div class="sol-title">${item.solTitle}</div>
            <div class="section-text">${item.solText}</div>
            ${item.link ? `<a class="link-btn" href="${item.link}" target="_blank" rel="noopener">🔗 참고 링크 보러가기</a>` : ''}
            <div class="cb-hint">↺ 클릭하면 앞면으로 돌아가요</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // fallback: try local image first, fall back to stock photo if missing
  grid.querySelectorAll('.card-photo').forEach(el => {
    const fallback = el.dataset.fallback;
    const localUrl = el.style.backgroundImage.slice(5, -2);
    const img = new Image();
    img.onerror = () => { el.style.backgroundImage = `url('${fallback}')`; };
    img.src = localUrl;
  });

  grid.querySelectorAll('.card').forEach(card => {
    card.querySelector('.card-inner').addEventListener('click', () => {
      card.classList.toggle('flipped');
    });
    card.querySelector('.link-btn')?.addEventListener('click', (e) => e.stopPropagation());
  });
}

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    grid.querySelectorAll('.card.flipped').forEach(c => c.classList.remove('flipped'));
  }
});

searchEl.addEventListener('input', (e) => {
  query = e.target.value;
  renderGrid();
});

renderChips();
renderGrid();
</script>
